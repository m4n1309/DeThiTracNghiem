version: '3.8'

services:
  # Database Service
  db:
    image: mysql:8.0
    container_name: examination-db
    restart: always
    environment:
      TZ: Asia/Ho_Chi_Minh
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tracnghiem
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-initialize the database
      - ./BE/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - exam-network

  # Backend Service
  backend:
    build: ./BE
    container_name: examination-backend
    restart: always
    depends_on:
      - db
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PORT=3001
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=tracnghiem
      - JWT_SECRET=supersecretkey123
      - JWT_EXPIRES_IN=24h
      - CORS_ORIGIN=${CORS_ORIGIN}
    # Port 3001 only exposed internally via nginx proxy
    expose:
      - "3001"
    networks:
      - exam-network

  # Frontend Service
  frontend:
    build: ./FE
    container_name: examination-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "8080:80"
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge

volumes:
  mysql_data:
